<!DOCTYPE html>
<!--
  hugo.bnls — Link in Bio | MADE Agency
  ─────────────────────────────────────
  1. PHOTO_PROFIL  → src="avatar.jpg" (déjà en place)
  2. BG_IMAGE      → fond animé Three.js (en place)
  3. URL_COACHING  → remplacer href="#coaching"
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0D0A0E">
  <title>hugo.bnls</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lavender: #B691FE;
      --bg:       #0D0A0E;
      --baltic:   #2D232E;
      --tofu:     #F1F0EA;
      --white:    #FFFFFF;
      --font:     'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--tofu);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Three.js canvas full screen ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(182,145,254,0.45);
      overflow: hidden;
      box-shadow: 0 0 0 4px rgba(182,145,254,0.08), 0 0 32px rgba(182,145,254,0.15);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .header__name {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.04em;
      text-transform: lowercase;
    }

    .header__tagline {
      font-size: 0.85rem;
      color: var(--tofu);
      opacity: 0.70;
      line-height: 1.5;
      max-width: 300px;
    }

    /* ── Cards ── */
    .links { display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 16px 20px;
      background: rgba(45,35,46,0.75);
      border: 1px solid rgba(182,145,254,0.20);
      border-radius: 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-decoration: none;
      cursor: pointer;
      transition: background .2s ease, border-color .2s ease, transform .2s ease, box-shadow .2s ease;
    }
    .btn:hover {
      background: rgba(182,145,254,0.10);
      border-color: rgba(182,145,254,0.50);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(182,145,254,0.12);
    }
    .btn:active { transform: translateY(0); }

    .btn__icon {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(182,145,254,0.15);
      border: 1px solid rgba(182,145,254,0.30);
      display: flex; align-items: center; justify-content: center;
    }
    .btn__icon svg { width: 20px; height: 20px; }

    .btn__text { flex: 1; min-width: 0; }
    .btn__title {
      font-size: 0.95rem; font-weight: 600;
      color: var(--white); letter-spacing: -0.02em; line-height: 1.3;
    }
    .btn__sub {
      font-size: 0.78rem; color: var(--tofu);
      opacity: 0.60; margin-top: 2px; line-height: 1.4;
    }

    .btn__arrow {
      flex-shrink: 0; width: 16px; height: 16px;
      color: rgba(182,145,254,0.35); fill: none;
      stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      transition: color .2s ease, transform .2s ease;
    }
    .btn:hover .btn__arrow { color: rgba(182,145,254,.7); transform: translateX(2px); }

    .footer {
      margin-top: auto; padding-top: 36px;
      font-size: 0.65rem;
      color: rgba(241,240,234,0.20);
      text-align: center; letter-spacing: 0.02em;
    }

    @media (max-width: 375px) {
      .page { padding: 48px 16px 32px; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<main class="page">
  <header class="header">
    <div class="avatar">
      <img src="avatar.jpg" alt="hugo.bnls">
    </div>
    <h1 class="header__name">hugo.bnls</h1>
    <p class="header__tagline">Ne lance pas ta marque au hasard.<br>Récupère ta stratégie ici.</p>
  </header>

  <nav class="links">
    <!-- URL_COACHING : remplacer href="#coaching" -->
    <a class="btn" href="#coaching" target="_blank" rel="noopener noreferrer">
      <div class="btn__icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shopify bag -->
          <rect x="3" y="7" width="14" height="11" rx="2" stroke="#B691FE" stroke-width="1.6"/>
          <path d="M7 7C7 4.79086 8.34315 3 10 3C11.6569 3 13 4.79086 13 7" stroke="#B691FE" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M8 11.5C8 11.5 8.8 13 10 13C11.2 13 12 11.5 12 11.5" stroke="#B691FE" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="btn__text">
        <span class="btn__title">Réserve et découvre notre coaching E-com</span>
        <span class="btn__sub">Postule pour rejoindre nos programmes</span>
      </div>
      <svg class="btn__arrow" viewBox="0 0 16 16"><polyline points="6 3 11 8 6 13"/></svg>
    </a>

    <a class="btn" href="https://instagram.com/hugo.bnls" target="_blank" rel="noopener noreferrer">
      <div class="btn__icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="16" height="16" rx="5" stroke="#B691FE" stroke-width="1.7"/>
          <circle cx="10" cy="10" r="3.2" stroke="#B691FE" stroke-width="1.7"/>
          <circle cx="14.8" cy="5.2" r="1" fill="#B691FE"/>
        </svg>
      </div>
      <div class="btn__text">
        <span class="btn__title">Suis mon quotidien</span>
        <span class="btn__sub">Rejoins-moi sur Instagram (Off &amp; Uncut)</span>
      </div>
      <svg class="btn__arrow" viewBox="0 0 16 16"><polyline points="6 3 11 8 6 13"/></svg>
    </a>
  </nav>

  <footer class="footer">hugo.bnls &copy; 2025</footer>
</main>

<!-- Three.js r158 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0D0A0E, 1);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0D0A0E, 0.035);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 18);

  /* ── Lighting ── */
  const ambient = new THREE.AmbientLight(0xB691FE, 0.3);
  scene.add(ambient);

  const point1 = new THREE.PointLight(0xB691FE, 2.5, 60);
  point1.position.set(-10, 12, 10);
  scene.add(point1);

  const point2 = new THREE.PointLight(0x6B3FCF, 1.8, 50);
  point2.position.set(12, -8, 5);
  scene.add(point2);

  /* ── Materials ── */
  const solidMat = new THREE.MeshPhongMaterial({
    color: 0xB691FE,
    emissive: 0x3A1B6E,
    transparent: true,
    opacity: 0.13,
    shininess: 80,
  });
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0xB691FE,
    wireframe: true,
    transparent: true,
    opacity: 0.22,
  });
  const edgeMat = new THREE.LineBasicMaterial({
    color: 0xB691FE,
    transparent: true,
    opacity: 0.35,
  });

  /* ── Shopify bag builder ── */
  function makeShopifyBag(scale) {
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(1.6, 1.8, 0.45);
    // Round corners via sphere trick (cheap)
    const body = new THREE.Mesh(bodyGeo, solidMat.clone());
    const bodyWire = new THREE.Mesh(bodyGeo.clone(), wireMat.clone());
    group.add(body);
    group.add(bodyWire);

    // Handle arc
    const handleGeo = new THREE.TorusGeometry(0.52, 0.09, 10, 24, Math.PI);
    const handleMat = new THREE.MeshPhongMaterial({
      color: 0xB691FE, emissive: 0x3A1B6E,
      transparent: true, opacity: 0.5, shininess: 100,
    });
    const handle = new THREE.Mesh(handleGeo, handleMat);
    handle.position.y = 1.1;
    handle.rotation.z = Math.PI;
    group.add(handle);

    // "S" emboss on face — circle + line approximation
    const sGeo = new THREE.TorusGeometry(0.32, 0.05, 8, 20);
    const sMat = new THREE.MeshBasicMaterial({ color: 0xB691FE, transparent: true, opacity: 0.45 });
    const sCircle = new THREE.Mesh(sGeo, sMat);
    sCircle.position.z = 0.23;
    group.add(sCircle);

    group.scale.setScalar(scale);
    return group;
  }

  /* ── Place multiple bags ── */
  const bags = [];
  const bagConfigs = [
    { x: -9,  y:  5,  z: -8, scale: 1.6, rotSpeed: 0.003, floatAmp: 0.8, floatSpeed: 0.5 },
    { x:  8,  y: -4,  z: -5, scale: 1.1, rotSpeed: 0.005, floatAmp: 1.0, floatSpeed: 0.7 },
    { x: -5,  y: -7,  z: -12,scale: 2.2, rotSpeed: 0.002, floatAmp: 1.2, floatSpeed: 0.3 },
    { x:  11, y:  8,  z: -15,scale: 2.8, rotSpeed: 0.0015,floatAmp: 0.6, floatSpeed: 0.4 },
    { x:  2,  y:  10, z: -10,scale: 1.4, rotSpeed: 0.004, floatAmp: 0.9, floatSpeed: 0.6 },
    { x: -12, y: -2,  z: -18,scale: 3.0, rotSpeed: 0.001, floatAmp: 1.4, floatSpeed: 0.25},
  ];

  bagConfigs.forEach(cfg => {
    const bag = makeShopifyBag(cfg.scale);
    bag.position.set(cfg.x, cfg.y, cfg.z);
    bag.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    bag.userData = { ...cfg, originY: cfg.y, phase: Math.random() * Math.PI * 2 };
    scene.add(bag);
    bags.push(bag);
  });

  /* ── Floating geometric accents ── */
  const accents = [];
  const accentGeos = [
    new THREE.IcosahedronGeometry(0.7, 0),
    new THREE.OctahedronGeometry(0.6, 0),
    new THREE.TetrahedronGeometry(0.8, 0),
    new THREE.IcosahedronGeometry(0.5, 0),
    new THREE.OctahedronGeometry(0.9, 0),
    new THREE.TetrahedronGeometry(0.55, 0),
    new THREE.IcosahedronGeometry(1.0, 0),
  ];
  const accentPositions = [
    [-7, 3, -3], [6, 7, -4], [-3, -9, -6],
    [9, -6, -8], [-11, 9, -10], [4, -3, -2], [-6, -5, -14],
  ];

  accentPositions.forEach((pos, i) => {
    const geo = accentGeos[i % accentGeos.length];

    const solid = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
      color: 0xB691FE, emissive: 0x2A0D5E,
      transparent: true, opacity: 0.08 + Math.random() * 0.08,
      shininess: 120,
    }));
    const wire = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
      color: 0xB691FE, wireframe: true,
      transparent: true, opacity: 0.20 + Math.random() * 0.15,
    }));

    solid.position.set(...pos);
    wire.position.set(...pos);

    const speed = 0.003 + Math.random() * 0.006;
    const phase = Math.random() * Math.PI * 2;
    solid.userData = { rotX: speed, rotY: speed * 1.3, rotZ: speed * 0.7, floatAmp: 0.4 + Math.random() * 0.6, floatSpeed: 0.3 + Math.random() * 0.4, phase, originY: pos[1] };
    wire.userData = solid.userData;

    scene.add(solid);
    scene.add(wire);
    accents.push(solid, wire);
  });

  /* ── Particle field ── */
  const particleCount = 280;
  const pPositions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    pPositions[i * 3]     = (Math.random() - 0.5) * 80;
    pPositions[i * 3 + 1] = (Math.random() - 0.5) * 60;
    pPositions[i * 3 + 2] = (Math.random() - 0.5) * 60 - 10;
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
  const pMat = new THREE.PointsMaterial({
    color: 0xB691FE,
    size: 0.12,
    transparent: true,
    opacity: 0.45,
    sizeAttenuation: true,
  });
  const particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  /* ── Gradient plane (back wall) ── */
  const gradGeo = new THREE.PlaneGeometry(80, 60);
  const gradMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying vec2 vUv;
      void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
    `,
    fragmentShader: `
      uniform float uTime;
      varying vec2 vUv;
      void main() {
        vec2 uv = vUv;
        float n1 = sin(uv.x * 3.0 + uTime * 0.3) * 0.5 + 0.5;
        float n2 = cos(uv.y * 2.5 - uTime * 0.2) * 0.5 + 0.5;
        float glow = n1 * n2;
        vec3 dark  = vec3(0.051, 0.039, 0.055); // #0D0A0E
        vec3 mid   = vec3(0.18, 0.10, 0.30);    // purple mid
        vec3 col   = mix(dark, mid, glow * 0.55);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
    depthWrite: false,
  });
  const gradPlane = new THREE.Mesh(gradGeo, gradMat);
  gradPlane.position.z = -28;
  scene.add(gradPlane);

  /* ── Mouse parallax ── */
  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  /* ── Resize ── */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ── Animate ── */
  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.012;

    // Background shader
    gradMat.uniforms.uTime.value = t;

    // Camera subtle drift
    camera.position.x += (mouseX * 1.5 - camera.position.x) * 0.03;
    camera.position.y += (-mouseY * 1.0 - camera.position.y) * 0.03;
    camera.lookAt(0, 0, 0);

    // Bags
    bags.forEach(bag => {
      const d = bag.userData;
      bag.rotation.x += d.rotSpeed;
      bag.rotation.y += d.rotSpeed * 1.4;
      bag.position.y = d.originY + Math.sin(t * d.floatSpeed + d.phase) * d.floatAmp;
    });

    // Accents
    accents.forEach(obj => {
      const d = obj.userData;
      obj.rotation.x += d.rotX;
      obj.rotation.y += d.rotY;
      obj.rotation.z += d.rotZ;
      obj.position.y = d.originY + Math.sin(t * d.floatSpeed + d.phase) * d.floatAmp;
    });

    // Particles slow drift
    particles.rotation.y = t * 0.015;
    particles.rotation.x = t * 0.008;

    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
