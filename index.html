<!DOCTYPE html>
<!--
  hugo.bnls — Link in Bio | MADE Agency
  ─────────────────────────────────────
  1. PHOTO_PROFIL  → src="avatar.jpg" (déjà en place)
  2. BG_IMAGE      → fond animé Three.js (en place)
  3. URL_COACHING  → remplacer href="#coaching"
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0D0A0E">
  <title>hugo.bnls</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lavender: #B691FE;
      --bg:       #0D0A0E;
      --baltic:   #2D232E;
      --tofu:     #F1F0EA;
      --white:    #FFFFFF;
      --font:     'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--tofu);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Three.js canvas full screen ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(182,145,254,0.45);
      overflow: hidden;
      box-shadow: 0 0 0 4px rgba(182,145,254,0.08), 0 0 32px rgba(182,145,254,0.15);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .header__name {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.04em;
      text-transform: lowercase;
    }

    .header__tagline {
      font-size: 0.85rem;
      color: var(--tofu);
      opacity: 0.70;
      line-height: 1.5;
      max-width: 300px;
    }

    /* ── Cards ── */
    .links { display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 16px 20px;
      background: rgba(45,35,46,0.75);
      border: 1px solid rgba(182,145,254,0.20);
      border-radius: 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-decoration: none;
      cursor: pointer;
      transition: background .2s ease, border-color .2s ease, transform .2s ease, box-shadow .2s ease;
    }
    .btn:hover {
      background: rgba(182,145,254,0.10);
      border-color: rgba(182,145,254,0.50);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(182,145,254,0.12);
    }
    .btn:active { transform: translateY(0); }

    .btn__icon {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(182,145,254,0.15);
      border: 1px solid rgba(182,145,254,0.30);
      display: flex; align-items: center; justify-content: center;
    }
    .btn__icon svg { width: 20px; height: 20px; }

    .btn__text { flex: 1; min-width: 0; }
    .btn__title {
      font-size: 0.95rem; font-weight: 600;
      color: var(--white); letter-spacing: -0.02em; line-height: 1.3;
    }
    .btn__sub {
      font-size: 0.78rem; color: var(--tofu);
      opacity: 0.60; margin-top: 2px; line-height: 1.4;
    }

    .btn__arrow {
      flex-shrink: 0; width: 16px; height: 16px;
      color: rgba(182,145,254,0.35); fill: none;
      stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      transition: color .2s ease, transform .2s ease;
    }
    .btn:hover .btn__arrow { color: rgba(182,145,254,.7); transform: translateX(2px); }

    .footer {
      margin-top: auto; padding-top: 36px;
      font-size: 0.65rem;
      color: rgba(241,240,234,0.20);
      text-align: center; letter-spacing: 0.02em;
    }

    @media (max-width: 375px) {
      .page { padding: 48px 16px 32px; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<main class="page">
  <header class="header">
    <div class="avatar">
      <img src="avatar.jpg" alt="hugo.bnls">
    </div>
    <h1 class="header__name">hugo.bnls</h1>
    <p class="header__tagline">Ne lance pas ta marque au hasard.<br>Récupère ta stratégie ici.</p>
  </header>

  <nav class="links">
    <a class="btn" href="https://cal.com/team/made-academie/decouverte-e-com" target="_blank" rel="noopener noreferrer">
      <div class="btn__icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shopify bag -->
          <rect x="3" y="7" width="14" height="11" rx="2" stroke="#B691FE" stroke-width="1.6"/>
          <path d="M7 7C7 4.79086 8.34315 3 10 3C11.6569 3 13 4.79086 13 7" stroke="#B691FE" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M8 11.5C8 11.5 8.8 13 10 13C11.2 13 12 11.5 12 11.5" stroke="#B691FE" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="btn__text">
        <span class="btn__title">Réserve et découvre notre coaching E-com</span>
        <span class="btn__sub">Postule pour rejoindre nos programmes</span>
      </div>
      <svg class="btn__arrow" viewBox="0 0 16 16"><polyline points="6 3 11 8 6 13"/></svg>
    </a>

    <a class="btn" href="https://instagram.com/hugo.bnls" target="_blank" rel="noopener noreferrer">
      <div class="btn__icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="16" height="16" rx="5" stroke="#B691FE" stroke-width="1.7"/>
          <circle cx="10" cy="10" r="3.2" stroke="#B691FE" stroke-width="1.7"/>
          <circle cx="14.8" cy="5.2" r="1" fill="#B691FE"/>
        </svg>
      </div>
      <div class="btn__text">
        <span class="btn__title">Suis mon quotidien</span>
        <span class="btn__sub">Rejoins-moi sur Instagram (Off &amp; Uncut)</span>
      </div>
      <svg class="btn__arrow" viewBox="0 0 16 16"><polyline points="6 3 11 8 6 13"/></svg>
    </a>
  </nav>

  <footer class="footer">hugo.bnls &copy; 2025</footer>
</main>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0D0A0E, 1);
  renderer.sortObjects = true;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0D0A0E, 0.028);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 18);

  /* ── Lights ── */
  scene.add(new THREE.AmbientLight(0xB691FE, 0.25));
  const pl1 = new THREE.PointLight(0xC9A8FF, 3, 80);
  pl1.position.set(-8, 10, 8);
  scene.add(pl1);
  const pl2 = new THREE.PointLight(0x6B3FCF, 2, 60);
  pl2.position.set(10, -8, 4);
  scene.add(pl2);

  /* ── Canvas texture: "S" neon ── */
  function makeStexture() {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 512, 512);
    // outer glow
    ctx.shadowColor = '#B691FE';
    ctx.shadowBlur = 60;
    ctx.fillStyle = '#D4B0FF';
    ctx.font = '700 310px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('S', 256, 268);
    // bright core
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#F0E0FF';
    ctx.font = '700 290px Georgia, serif';
    ctx.fillText('S', 256, 268);
    return new THREE.CanvasTexture(c);
  }
  const sTex = makeStexture();

  /* ── Bag builder ── */
  function makeNeonBag(opacity) {
    const g = new THREE.Group();

    // — Bag body via ExtrudeGeometry (trapezoidal front face) —
    const shape = new THREE.Shape();
    shape.moveTo(-0.85, -1.10);
    shape.lineTo( 0.85, -1.10);
    shape.lineTo( 0.95,  0.90);
    shape.lineTo(-0.95,  0.90);
    shape.closePath();

    const extCfg = { depth: 0.55, bevelEnabled: true, bevelThickness: 0.04, bevelSize: 0.04, bevelSegments: 2 };
    const bodyGeo = new THREE.ExtrudeGeometry(shape, extCfg);
    bodyGeo.center();

    // solid fill (very transparent)
    const fillMat = new THREE.MeshPhongMaterial({
      color: 0x2A0A50, emissive: 0x1A063A,
      transparent: true, opacity: opacity * 0.55, side: THREE.FrontSide,
    });
    g.add(new THREE.Mesh(bodyGeo, fillMat));

    // neon edge lines
    const edges = new THREE.EdgesGeometry(bodyGeo);
    const edgeLine = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({
      color: 0xC9A0FF, transparent: true, opacity: opacity,
    }));
    g.add(edgeLine);

    // outer glow shell (slightly bigger, additive)
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xB691FE, transparent: true, opacity: opacity * 0.07,
      side: THREE.BackSide,
    });
    const glowShell = new THREE.Mesh(bodyGeo, glowMat);
    glowShell.scale.setScalar(1.12);
    g.add(glowShell);

    // — "S" plane on front face —
    const sPlaneMat = new THREE.MeshBasicMaterial({
      map: sTex, transparent: true,
      opacity: opacity * 0.92, depthWrite: false,
    });
    const sPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.1, 1.3), sPlaneMat);
    sPlane.position.set(0, -0.05, 0.32);
    g.add(sPlane);

    // — Handle (two separate rope arcs) —
    function makeHandle(xOffset) {
      const hGeo = new THREE.TorusGeometry(0.30, 0.055, 10, 24, Math.PI);
      const hMat = new THREE.MeshPhongMaterial({
        color: 0xD4B0FF, emissive: 0x8B5CF6,
        emissiveIntensity: 1.2,
        transparent: true, opacity: opacity * 0.95,
        shininess: 200,
      });
      const h = new THREE.Mesh(hGeo, hMat);
      h.position.set(xOffset, 0.78, 0.0);
      h.rotation.z = Math.PI;
      // glow ring around handle
      const hGlow = new THREE.Mesh(
        new THREE.TorusGeometry(0.30, 0.14, 6, 24, Math.PI),
        new THREE.MeshBasicMaterial({ color: 0xB691FE, transparent: true, opacity: opacity * 0.12 })
      );
      hGlow.position.copy(h.position);
      hGlow.rotation.copy(h.rotation);
      g.add(hGlow);
      g.add(h);
    }
    makeHandle(-0.30);
    makeHandle( 0.30);

    return g;
  }

  /* ── Spawn bags ── */
  const bags = [];
  const bagCfgs = [
    { x: -8,  y:  4,  z: -7,  s: 1.7,  op: 0.75, rs: 0.0030, fa: 0.9, fs: 0.45 },
    { x:  7,  y: -3,  z: -5,  s: 1.2,  op: 0.65, rs: 0.0045, fa: 1.0, fs: 0.60 },
    { x: -4,  y: -8,  z: -11, s: 2.1,  op: 0.55, rs: 0.0020, fa: 1.2, fs: 0.30 },
    { x: 10,  y:  7,  z: -14, s: 2.6,  op: 0.45, rs: 0.0015, fa: 0.7, fs: 0.38 },
    { x:  2,  y:  9,  z: -9,  s: 1.3,  op: 0.60, rs: 0.0035, fa: 0.8, fs: 0.55 },
    { x:-12,  y: -1,  z: -17, s: 3.0,  op: 0.35, rs: 0.0010, fa: 1.5, fs: 0.22 },
    { x:  5,  y: -11, z: -13, s: 1.5,  op: 0.50, rs: 0.0025, fa: 1.1, fs: 0.40 },
  ];

  bagCfgs.forEach(cfg => {
    const bag = makeNeonBag(cfg.op);
    bag.scale.setScalar(cfg.s);
    bag.position.set(cfg.x, cfg.y, cfg.z);
    bag.rotation.set(
      (Math.random() - 0.5) * 0.6,
      (Math.random() - 0.5) * 1.2,
      (Math.random() - 0.5) * 0.3
    );
    bag.userData = { ...cfg, originY: cfg.y, phase: Math.random() * Math.PI * 2 };
    scene.add(bag);
    bags.push(bag);
  });

  /* ── Particle field ── */
  const pCount = 320;
  const pPos = new Float32Array(pCount * 3);
  for (let i = 0; i < pCount; i++) {
    pPos[i*3]   = (Math.random()-0.5)*90;
    pPos[i*3+1] = (Math.random()-0.5)*70;
    pPos[i*3+2] = (Math.random()-0.5)*70 - 10;
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
    color: 0xC9A8FF, size: 0.10, transparent: true, opacity: 0.50, sizeAttenuation: true,
  }));
  scene.add(particles);

  /* ── Animated gradient bg plane ── */
  const gradMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      uniform float uTime; varying vec2 vUv;
      void main(){
        float g1 = sin(vUv.x*2.8 + uTime*0.25)*0.5+0.5;
        float g2 = cos(vUv.y*2.2 - uTime*0.18)*0.5+0.5;
        float spot1 = exp(-length(vUv - vec2(0.15+sin(uTime*0.12)*0.1, 0.75+cos(uTime*0.09)*0.1))*3.5);
        float spot2 = exp(-length(vUv - vec2(0.82+cos(uTime*0.08)*0.1, 0.25+sin(uTime*0.11)*0.1))*4.0);
        vec3 dark = vec3(0.051,0.039,0.055);
        vec3 purple = vec3(0.18,0.09,0.32);
        vec3 col = mix(dark, purple, (g1*g2)*0.40 + spot1*0.50 + spot2*0.40);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
    depthWrite: false,
  });
  const gradPlane = new THREE.Mesh(new THREE.PlaneGeometry(90, 70), gradMat);
  gradPlane.position.z = -30;
  scene.add(gradPlane);

  /* ── Mouse parallax ── */
  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  /* ── Resize ── */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ── Loop ── */
  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.010;
    gradMat.uniforms.uTime.value = t;

    camera.position.x += (mouseX * 1.8 - camera.position.x) * 0.025;
    camera.position.y += (-mouseY * 1.2 - camera.position.y) * 0.025;
    camera.lookAt(0, 0, 0);

    bags.forEach(bag => {
      const d = bag.userData;
      bag.rotation.y += d.rs;
      bag.rotation.x += d.rs * 0.3;
      bag.position.y = d.originY + Math.sin(t * d.fs + d.phase) * d.fa;
    });

    particles.rotation.y = t * 0.012;
    particles.rotation.x = t * 0.006;

    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
