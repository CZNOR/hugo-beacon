<!DOCTYPE html>
<!--
  hugo.bnls — Link in Bio | MADE Agency
  1. PHOTO_PROFIL → src="avatar.jpg"
  2. URL_COACHING  → href="https://cal.com/team/made-academie/decouverte-e-com"
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05010a">
  <title>hugo.bnls</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      background: #05010a;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Floating bags ── */
    .scene {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    .bag {
      position: absolute;
      will-change: transform;
    }
    .bag img {
      display: block; width: 100%; height: auto;
    }

    @keyframes float-a {
      0%,100% { transform: translateY(0) translateX(0); }
      40%     { transform: translateY(-22px) translateX(6px); }
      70%     { transform: translateY(-10px) translateX(-4px); }
    }
    @keyframes float-b {
      0%,100% { transform: translateY(0) translateX(0); }
      35%     { transform: translateY(-18px) translateX(-8px); }
      65%     { transform: translateY(-8px) translateX(5px); }
    }
    @keyframes float-c {
      0%,100% { transform: translateY(0) translateX(0); }
      50%     { transform: translateY(-28px) translateX(3px); }
    }
    @keyframes float-d {
      0%,100% { transform: translateY(0) translateX(0); }
      45%     { transform: translateY(-16px) translateX(-6px); }
      75%     { transform: translateY(-24px) translateX(8px); }
    }

    /* ── Page content ── */
    .page {
      position: relative; z-index: 10;
      width: 100%; max-width: 448px;
      min-height: 100vh; margin: 0 auto;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 160px 24px 112px;
    }

    /* ── Avatar ── */
    .avatar-wrap { position: relative; margin-bottom: 28px; }
    .avatar-glow {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: rgba(139,92,246,0.30);
      filter: blur(20px);
    }
    .avatar {
      position: relative;
      width: 112px; height: 112px;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.60);
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      padding: 3px;
      box-shadow: 0 0 35px rgba(168,85,247,0.28);
    }
    .avatar img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover; display: block;
    }

    .name {
      font-size: 42px; font-weight: 800;
      letter-spacing: -0.03em; color: #fff;
    }
    .tagline {
      margin-top: 20px; max-width: 280px;
      text-align: center; font-size: 17px;
      line-height: 1.5; color: rgba(255,255,255,0.72);
    }

    /* ── CTA buttons ── */
    .ctas { margin-top: 48px; width: 100%; display: flex; flex-direction: column; gap: 20px; }

    .cta {
      display: flex; align-items: center; gap: 16px;
      width: 100%; padding: 20px;
      border-radius: 24px;
      border: 1px solid rgba(167,139,250,0.20);
      background: rgba(20,8,30,0.82);
      box-shadow: 0 0 0 1px rgba(168,85,247,0.05), 0 12px 50px rgba(0,0,0,0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      text-decoration: none; cursor: pointer;
      transition: border-color .3s, background .3s;
    }
    .cta:hover {
      border-color: rgba(167,139,250,0.35);
      background: rgba(26,10,38,0.92);
    }

    .cta__icon {
      flex-shrink: 0; width: 64px; height: 64px;
      border-radius: 16px;
      border: 1px solid rgba(167,139,250,0.30);
      background: rgba(168,85,247,0.10);
      box-shadow: inset 0 0 25px rgba(168,85,247,0.12), 0 0 20px rgba(168,85,247,0.14);
      display: flex; align-items: center; justify-content: center;
    }
    .cta__icon svg { width: 24px; height: 24px; stroke: #c4b5fd; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .cta__text { flex: 1; min-width: 0; }
    .cta__title {
      font-size: 18px; font-weight: 600;
      line-height: 1.2; color: #fff;
    }
    .cta__sub {
      margin-top: 8px; font-size: 15px;
      line-height: 1.35; color: rgba(255,255,255,0.62);
    }

    .cta__arrow {
      flex-shrink: 0; width: 24px; height: 24px;
      stroke: rgba(167,139,250,0.80); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      transition: transform .3s;
    }
    .cta:hover .cta__arrow { transform: translateX(4px); }

    @media (max-width: 480px) {
      .page { padding: 140px 20px 80px; }
      .name { font-size: 36px; }
    }
    @media (max-width: 375px) {
      .page { padding: 120px 16px 60px; }
      .name { font-size: 32px; }
    }
  </style>
</head>
<body>

<!-- ── Floating 3D bags ── -->
<div class="scene" id="scene">
  <!-- sac1 : haut gauche, grand -->
  <div class="bag" style="left:-6%;top:2%;width:280px;animation:float-a 7s ease-in-out infinite;opacity:0.92;">
    <img src="sac1.png" alt="">
  </div>
  <!-- sac2 : haut droite -->
  <div class="bag" style="right:-4%;top:0%;width:240px;animation:float-b 6.5s 0.8s ease-in-out infinite;opacity:0.88;">
    <img src="sac2.png" alt="">
  </div>
  <!-- sac3 : milieu gauche, plus petit -->
  <div class="bag" style="left:-2%;top:50%;width:200px;animation:float-c 8s 1.5s ease-in-out infinite;opacity:0.78;">
    <img src="sac3.png" alt="">
  </div>
  <!-- sac4 : bas droite -->
  <div class="bag" style="right:-2%;bottom:4%;width:260px;animation:float-d 7.5s 2s ease-in-out infinite;opacity:0.85;">
    <img src="sac4.png" alt="">
  </div>
  <!-- sac1 encore : bas centre-gauche, petit, blurred -->
  <div class="bag" style="left:25%;bottom:2%;width:140px;animation:float-b 9s 1s ease-in-out infinite;opacity:0.55;filter:blur(2px);">
    <img src="sac1.png" alt="">
  </div>
  <!-- sac3 : haut centre-droite, petit -->
  <div class="bag" style="right:20%;top:12%;width:120px;animation:float-a 8.5s 3s ease-in-out infinite;opacity:0.50;filter:blur(1.5px);">
    <img src="sac3.png" alt="">
  </div>
</div>

<!-- ── Page content ── -->
<section class="page">
  <div class="avatar-wrap">
    <div class="avatar-glow"></div>
    <div class="avatar">
      <img src="avatar.jpg" alt="hugo.bnls">
    </div>
  </div>

  <h1 class="name">hugo.bnls</h1>

  <p class="tagline">
    Ne lance pas ta marque au hasard.<br>
    Récupère ta stratégie ici.
  </p>

  <nav class="ctas">
    <a class="cta" href="https://cal.com/team/made-academie/decouverte-e-com" target="_blank" rel="noopener noreferrer">
      <div class="cta__icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
      </div>
      <div class="cta__text">
        <div class="cta__title">Réserve et découvre notre coaching E-com</div>
        <div class="cta__sub">Postule pour rejoindre nos programmes</div>
      </div>
      <svg class="cta__arrow" viewBox="0 0 24 24"><polyline points="9 5 16 12 9 19"/></svg>
    </a>

    <a class="cta" href="https://instagram.com/hugo.bnls" target="_blank" rel="noopener noreferrer">
      <div class="cta__icon">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="5"/>
          <circle cx="17.5" cy="6.5" r="1.5" fill="#c4b5fd" stroke="none"/>
        </svg>
      </div>
      <div class="cta__text">
        <div class="cta__title">Suis mon quotidien</div>
        <div class="cta__sub">Rejoins-moi sur Instagram (Off &amp; Uncut)</div>
      </div>
      <svg class="cta__arrow" viewBox="0 0 24 24"><polyline points="9 5 16 12 9 19"/></svg>
    </a>
  </nav>
</section>

<script>
// Parallaxe souris subtile sur les sacs
(function() {
  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX / window.innerWidth - 0.5;
    my = e.clientY / window.innerHeight - 0.5;
  });
  const bags = document.querySelectorAll('.bag');
  function tick() {
    bags.forEach((b, i) => {
      const d = 0.4 + (i % 3) * 0.3;
      b.style.transform = `translate(${mx * 20 * d}px, ${my * 14 * d}px)`;
    });
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

</body>
</html>
