<!DOCTYPE html>
<!--
  hugo.bnls — Link in Bio | MADE Agency
  1. PHOTO_PROFIL → src="avatar.jpg"
  2. URL_COACHING  → href="https://cal.com/team/made-academie/decouverte-e-com"
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0D0A0E">
  <title>hugo.bnls</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lavender: #B691FE;
      --bg:       #0D0A0E;
      --tofu:     #F1F0EA;
      --white:    #FFFFFF;
      --font:     'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font);
      background: #0D0A0E;
      color: var(--tofu);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Fond dégradé animé ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 80%, rgba(124,58,237,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 20%, rgba(124,58,237,0.12) 0%, transparent 70%),
        #0D0A0E;
      pointer-events: none;
    }

    /* ── Scène SVG bags ── */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .bag-wrap {
      position: absolute;
      transform-origin: center center;
      will-change: transform;
    }

    .bag-svg {
      display: block;
      transform-origin: center center;
    }

    /* Animations floating — 8 variantes */
    @keyframes float-a {
      0%,100% { transform: translateY(0px) translateX(0px); }
      40%     { transform: translateY(-22px) translateX(6px); }
      70%     { transform: translateY(-10px) translateX(-4px); }
    }
    @keyframes float-b {
      0%,100% { transform: translateY(0px) translateX(0px); }
      35%     { transform: translateY(-18px) translateX(-8px); }
      65%     { transform: translateY(-8px) translateX(5px); }
    }
    @keyframes float-c {
      0%,100% { transform: translateY(0px) translateX(0px); }
      50%     { transform: translateY(-28px) translateX(3px); }
    }
    @keyframes float-d {
      0%,100% { transform: translateY(0px) translateX(0px); }
      45%     { transform: translateY(-16px) translateX(-6px); }
      75%     { transform: translateY(-24px) translateX(8px); }
    }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      text-align: center;
    }

    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(182,145,254,0.45);
      overflow: hidden;
      box-shadow: 0 0 0 4px rgba(182,145,254,0.08), 0 0 32px rgba(182,145,254,0.18);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .header__name {
      font-size: 1.4rem; font-weight: 700;
      color: var(--white);
      letter-spacing: -0.04em;
      text-transform: lowercase;
    }
    .header__tagline {
      font-size: 0.85rem; color: var(--tofu);
      opacity: 0.70; line-height: 1.5; max-width: 300px;
    }

    /* ── Cards ── */
    .links { display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .btn {
      display: flex; align-items: center; gap: 16px;
      width: 100%; padding: 16px 20px;
      background: rgba(45,35,46,0.80);
      border: 1px solid rgba(182,145,254,0.20);
      border-radius: 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-decoration: none; cursor: pointer;
      transition: background .2s, border-color .2s, transform .2s, box-shadow .2s;
    }
    .btn:hover {
      background: rgba(182,145,254,0.10);
      border-color: rgba(182,145,254,0.50);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(182,145,254,0.12);
    }
    .btn:active { transform: translateY(0); }

    .btn__icon {
      flex-shrink: 0; width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(182,145,254,0.15);
      border: 1px solid rgba(182,145,254,0.30);
      display: flex; align-items: center; justify-content: center;
    }
    .btn__icon svg { width: 20px; height: 20px; }
    .btn__text { flex: 1; min-width: 0; }
    .btn__title {
      font-size: 0.95rem; font-weight: 600;
      color: var(--white); letter-spacing: -0.02em; line-height: 1.3;
    }
    .btn__sub {
      font-size: 0.78rem; color: var(--tofu);
      opacity: 0.60; margin-top: 2px; line-height: 1.4;
    }
    .btn__arrow {
      flex-shrink: 0; width: 16px; height: 16px;
      color: rgba(182,145,254,0.35); fill: none;
      stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      transition: color .2s, transform .2s;
    }
    .btn:hover .btn__arrow { color: rgba(182,145,254,.7); transform: translateX(2px); }

    .footer {
      margin-top: auto; padding-top: 36px;
      font-size: 0.65rem;
      color: rgba(241,240,234,0.20);
      text-align: center; letter-spacing: 0.02em;
    }

    @media (max-width: 375px) { .page { padding: 48px 16px 32px; } }
  </style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="scene" id="scene"></div>

<main class="page">
  <header class="header">
    <div class="avatar">
      <img src="avatar.jpg" alt="hugo.bnls">
    </div>
    <h1 class="header__name">hugo.bnls</h1>
    <p class="header__tagline">Ne lance pas ta marque au hasard.<br>Récupère ta stratégie ici.</p>
  </header>

  <nav class="links">
    <a class="btn" href="https://cal.com/team/made-academie/decouverte-e-com" target="_blank" rel="noopener noreferrer">
      <div class="btn__icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="7" width="14" height="11" rx="2" stroke="#B691FE" stroke-width="1.6"/>
          <path d="M7 7C7 4.79086 8.34315 3 10 3C11.6569 3 13 4.79086 13 7" stroke="#B691FE" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M8 11.5C8 11.5 8.8 13 10 13C11.2 13 12 11.5 12 11.5" stroke="#B691FE" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="btn__text">
        <span class="btn__title">Réserve et découvre notre coaching E-com</span>
        <span class="btn__sub">Postule pour rejoindre nos programmes</span>
      </div>
      <svg class="btn__arrow" viewBox="0 0 16 16"><polyline points="6 3 11 8 6 13"/></svg>
    </a>

    <a class="btn" href="https://instagram.com/hugo.bnls" target="_blank" rel="noopener noreferrer">
      <div class="btn__icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="16" height="16" rx="5" stroke="#B691FE" stroke-width="1.7"/>
          <circle cx="10" cy="10" r="3.2" stroke="#B691FE" stroke-width="1.7"/>
          <circle cx="14.8" cy="5.2" r="1" fill="#B691FE"/>
        </svg>
      </div>
      <div class="btn__text">
        <span class="btn__title">Suis mon quotidien</span>
        <span class="btn__sub">Rejoins-moi sur Instagram (Off &amp; Uncut)</span>
      </div>
      <svg class="btn__arrow" viewBox="0 0 16 16"><polyline points="6 3 11 8 6 13"/></svg>
    </a>
  </nav>

  <footer class="footer">hugo.bnls &copy; 2025</footer>
</main>

<script>
(function () {
  // ── SVG Shopify bag : paths exacts du logo officiel, recolorisés violet ──
  function makeBagSVG(id) {
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 197.9 225">
  <defs>
    <!-- Filtre neon glow violet intensifié -->
    <filter id="neon${id}" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="b3"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.49  0 0 0 0 0.23  0 0 0 0 0.93  0 0 0 2.5 0" result="g1"/>
      <feColorMatrix in="b2" type="matrix"
        values="0 0 0 0 0.49  0 0 0 0 0.23  0 0 0 0 0.93  0 0 0 1.5 0" result="g2"/>
      <feColorMatrix in="b3" type="matrix"
        values="0 0 0 0 0.49  0 0 0 0 0.23  0 0 0 0 0.93  0 0 0 0.8 0" result="g3"/>
      <feMerge>
        <feMergeNode in="g3"/>
        <feMergeNode in="g2"/>
        <feMergeNode in="g1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow doux pour le S -->
    <filter id="sglow${id}" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="sg"/>
      <feMerge><feMergeNode in="sg"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Dégradé face avant -->
    <linearGradient id="faceGrad${id}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <!-- Dégradé panneau droit clair -->
    <linearGradient id="rightGrad${id}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <!-- Corps principal du sac (face avant + structure) -->
  <path filter="url(#neon${id})" fill="url(#faceGrad${id})"
    d="M128.16,28.85c-2.41-7.63-6.14-13.83-12-18.5-3.76-3-8.02-2.86-12.34-4.27-2.92-.95-5.33-5.05-8.37-6.08h-9.69c-.75.87-1.5.99-2.37,1.21-20.89,5.31-33.24,31.56-38.64,53.27l-23.33,7.52c-1.92.62-3.62,1.89-3.93,4.33L0,201.02l82.24,15.33,40.34,7.55c.99.09,1.58.6,1.87,1.1h4l9.43-198.14c-3.05-.41-5.88.81-9.72,1.99ZM99.98,15.92c2.26,7.09,2.94,13.85,2.59,20.9l-19.47,6.05c-.83.26-1.55.39-2.64.05l3.71-10.7c3.92-6.9,8.35-13.4,15.81-16.3ZM82.48,9.87c.38-.09.79-.59,1.03-.92,3.58-.81,7.12-2.18,11.58.13-4.78,2.23-7.56,4.95-10.81,7.96-.02.75-.51,1.31-1.01,1.85-6.54,7.21-9.6,17.04-11.81,27.38l-17.82,5.55c4.16-15.26,15.97-39.06,28.84-41.95ZM96.11,106.01c-4.78-2.17-8.51-3.39-12.41-3.95-8.81-.9-16.99,1.3-18.3,8.58-1.39,7.73,10.04,13.52,18.02,19.52-.04.5.48,1.39.87,1.69,17.05,13.17,13.01,41.95.21,51.26-.5.37-.74,1.29-.99,1.86-16.82,11.15-39.16,6.72-53.14-7.46l5.86-19.51c9.15,7.17,21.9,13.72,28,7.22,2.33-2.5,3-6.33,1.75-9.86-3.42-9.66-18.87-14.34-22.76-27.25-4.49-14.93,1-31.44,13.06-41.18,8.01-6.47,17.58-9.29,27.41-9.85,6.76-.35,13.76.21,21.08,3.15l-8.66,25.78ZM110.37,34.36c.08-7.15-.55-12.84-2.47-19.52,3.71.12,5.53,2.15,7.41,4.26,2.57,3.52,4.21,6.69,6.1,11.81l-11.04,3.45Z"/>

  <!-- Panneau ombre droite (profondeur) -->
  <path fill="#3B0F8C" opacity="0.9"
    d="M153.46,219.55l-23.28,5.45h-1.73l9.43-198.14c.94.12,2.22.61,3.13,1.53l12.3,12.4.15,178.76Z"/>

  <!-- Panneau brillant droit -->
  <path fill="url(#rightGrad${id})" opacity="0.85"
    d="M197.9,210.02l-44.44,9.53-.15-178.76c6.41.24,12.83.58,19.79,1.7l24.8,167.53Z"/>

  <!-- Logo S officiel Shopify — blanc avec glow -->
  <path filter="url(#sglow${id})" fill="#FFFFFF"
    d="M65.4,110.64c-1.39,7.73,10.04,13.52,18.02,19.52-.04.5.48,1.39.87,1.69,17.05,13.17,13.01,41.95.21,51.26-.5.37-.74,1.29-.99,1.86-16.82,11.15-39.16,6.72-53.14-7.46l5.86-19.51c9.15,7.17,21.9,13.72,28,7.22,2.33-2.5,3-6.33,1.75-9.86-3.42-9.66-18.87-14.34-22.76-27.25-4.49-14.93,1-31.44,13.06-41.18,8.01-6.47,17.58-9.29,27.41-9.85,6.76-.35,13.76.21,21.08,3.15l-8.66,25.78c-4.78-2.17-8.51-3.39-12.41-3.95-8.81-.9-16.99,1.3-18.3,8.58Z"/>
</svg>`;
  }

  // ── Config de chaque sac : position, taille, rotation 3D, animation ──
  const bags = [
    // [left%, top%, width_px, ry_deg, rx_deg, rz_deg, float_anim, duration_s, delay_s, opacity, blur_px]
    [ -4,   8,  220, -22,   8, -6,  'float-a', 7.0, 0.0, 0.90, 0   ],
    [ 66,   4,  180,  18,  -6,  8,  'float-b', 6.5, 0.8, 0.85, 0   ],
    [ 78,  52,  140,  20,  10, -3,  'float-c', 8.0, 1.5, 0.75, 0   ],
    [ -6,  55,  160, -18,   6,  5,  'float-d', 7.5, 2.2, 0.80, 0   ],
    [ 30,  72,  110, -12,   4, -4,  'float-a', 9.0, 1.0, 0.70, 0   ],
    [ 55,  70,   90,  15,  -4,  6,  'float-b', 8.5, 3.0, 0.65, 0   ],
    [ 82,  18,  100, -25,  12, -8,  'float-c', 7.0, 0.5, 0.60, 2   ],
    [ 10,  82,   80,  10,   6,  3,  'float-d', 9.5, 2.0, 0.55, 2   ],
  ];

  const scene = document.getElementById('scene');

  bags.forEach(([l, t, w, ry, rx, rz, anim, dur, delay, op, blur], i) => {
    const wrap = document.createElement('div');
    wrap.className = 'bag-wrap';
    wrap.style.cssText = `
      left: ${l}%;
      top: ${t}%;
      animation: ${anim} ${dur}s ${delay}s ease-in-out infinite;
    `;

    const inner = document.createElement('div');
    inner.className = 'bag-svg';
    inner.style.cssText = `
      width: ${w}px;
      transform: perspective(700px) rotateY(${ry}deg) rotateX(${rx}deg) rotateZ(${rz}deg);
      opacity: ${op};
      ${blur > 0 ? `filter: blur(${blur}px);` : ''}
    `;
    inner.innerHTML = makeBagSVG(i);

    wrap.appendChild(inner);
    scene.appendChild(wrap);
  });

  // Parallaxe souris subtile
  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = (e.clientX / window.innerWidth  - 0.5);
    my = (e.clientY / window.innerHeight - 0.5);
  });

  const wraps = scene.querySelectorAll('.bag-wrap');
  let raf;
  function tick() {
    wraps.forEach((w, i) => {
      const depth = 0.4 + (i % 3) * 0.3;
      const dx = mx * 18 * depth;
      const dy = my * 12 * depth;
      w.style.transform = `translate(${dx}px, ${dy}px)`;
    });
    raf = requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
