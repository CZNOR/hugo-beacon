<!DOCTYPE html>
<!--
  hugo.bnls — Link in Bio | MADE Agency
  1. PHOTO_PROFIL → src="avatar.jpg"
  2. URL_COACHING  → href="https://cal.com/team/made-academie/decouverte-e-com"
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0D0A0E">
  <title>hugo.bnls</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lavender: #B691FE;
      --bg:       #0D0A0E;
      --tofu:     #F1F0EA;
      --white:    #FFFFFF;
      --font:     'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font);
      background: #0D0A0E;
      color: var(--tofu);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Fond dégradé animé ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 80%, rgba(124,58,237,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 20%, rgba(124,58,237,0.12) 0%, transparent 70%),
        #0D0A0E;
      pointer-events: none;
    }

    /* ── Scène SVG bags ── */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .bag-wrap {
      position: absolute;
      transform-origin: center center;
      will-change: transform;
    }

    .bag-svg {
      display: block;
      transform-origin: center center;
    }

    /* Animations floating — 8 variantes */
    @keyframes float-a {
      0%,100% { transform: translateY(0px) translateX(0px); }
      40%     { transform: translateY(-22px) translateX(6px); }
      70%     { transform: translateY(-10px) translateX(-4px); }
    }
    @keyframes float-b {
      0%,100% { transform: translateY(0px) translateX(0px); }
      35%     { transform: translateY(-18px) translateX(-8px); }
      65%     { transform: translateY(-8px) translateX(5px); }
    }
    @keyframes float-c {
      0%,100% { transform: translateY(0px) translateX(0px); }
      50%     { transform: translateY(-28px) translateX(3px); }
    }
    @keyframes float-d {
      0%,100% { transform: translateY(0px) translateX(0px); }
      45%     { transform: translateY(-16px) translateX(-6px); }
      75%     { transform: translateY(-24px) translateX(8px); }
    }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      text-align: center;
    }

    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(182,145,254,0.45);
      overflow: hidden;
      box-shadow: 0 0 0 4px rgba(182,145,254,0.08), 0 0 32px rgba(182,145,254,0.18);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .header__name {
      font-size: 1.4rem; font-weight: 700;
      color: var(--white);
      letter-spacing: -0.04em;
      text-transform: lowercase;
    }
    .header__tagline {
      font-size: 0.85rem; color: var(--tofu);
      opacity: 0.70; line-height: 1.5; max-width: 300px;
    }

    /* ── Cards ── */
    .links { display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .btn {
      display: flex; align-items: center; gap: 16px;
      width: 100%; padding: 16px 20px;
      background: rgba(45,35,46,0.80);
      border: 1px solid rgba(182,145,254,0.20);
      border-radius: 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-decoration: none; cursor: pointer;
      transition: background .2s, border-color .2s, transform .2s, box-shadow .2s;
    }
    .btn:hover {
      background: rgba(182,145,254,0.10);
      border-color: rgba(182,145,254,0.50);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(182,145,254,0.12);
    }
    .btn:active { transform: translateY(0); }

    .btn__icon {
      flex-shrink: 0; width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(182,145,254,0.15);
      border: 1px solid rgba(182,145,254,0.30);
      display: flex; align-items: center; justify-content: center;
    }
    .btn__icon svg { width: 20px; height: 20px; }
    .btn__text { flex: 1; min-width: 0; }
    .btn__title {
      font-size: 0.95rem; font-weight: 600;
      color: var(--white); letter-spacing: -0.02em; line-height: 1.3;
    }
    .btn__sub {
      font-size: 0.78rem; color: var(--tofu);
      opacity: 0.60; margin-top: 2px; line-height: 1.4;
    }
    .btn__arrow {
      flex-shrink: 0; width: 16px; height: 16px;
      color: rgba(182,145,254,0.35); fill: none;
      stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      transition: color .2s, transform .2s;
    }
    .btn:hover .btn__arrow { color: rgba(182,145,254,.7); transform: translateX(2px); }

    .footer {
      margin-top: auto; padding-top: 36px;
      font-size: 0.65rem;
      color: rgba(241,240,234,0.20);
      text-align: center; letter-spacing: 0.02em;
    }

    @media (max-width: 375px) { .page { padding: 48px 16px 32px; } }
  </style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="scene" id="scene"></div>

<main class="page">
  <header class="header">
    <div class="avatar">
      <img src="avatar.jpg" alt="hugo.bnls">
    </div>
    <h1 class="header__name">hugo.bnls</h1>
    <p class="header__tagline">Ne lance pas ta marque au hasard.<br>Récupère ta stratégie ici.</p>
  </header>

  <nav class="links">
    <a class="btn" href="https://cal.com/team/made-academie/decouverte-e-com" target="_blank" rel="noopener noreferrer">
      <div class="btn__icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="7" width="14" height="11" rx="2" stroke="#B691FE" stroke-width="1.6"/>
          <path d="M7 7C7 4.79086 8.34315 3 10 3C11.6569 3 13 4.79086 13 7" stroke="#B691FE" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M8 11.5C8 11.5 8.8 13 10 13C11.2 13 12 11.5 12 11.5" stroke="#B691FE" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="btn__text">
        <span class="btn__title">Réserve et découvre notre coaching E-com</span>
        <span class="btn__sub">Postule pour rejoindre nos programmes</span>
      </div>
      <svg class="btn__arrow" viewBox="0 0 16 16"><polyline points="6 3 11 8 6 13"/></svg>
    </a>

    <a class="btn" href="https://instagram.com/hugo.bnls" target="_blank" rel="noopener noreferrer">
      <div class="btn__icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="16" height="16" rx="5" stroke="#B691FE" stroke-width="1.7"/>
          <circle cx="10" cy="10" r="3.2" stroke="#B691FE" stroke-width="1.7"/>
          <circle cx="14.8" cy="5.2" r="1" fill="#B691FE"/>
        </svg>
      </div>
      <div class="btn__text">
        <span class="btn__title">Suis mon quotidien</span>
        <span class="btn__sub">Rejoins-moi sur Instagram (Off &amp; Uncut)</span>
      </div>
      <svg class="btn__arrow" viewBox="0 0 16 16"><polyline points="6 3 11 8 6 13"/></svg>
    </a>
  </nav>

  <footer class="footer">hugo.bnls &copy; 2025</footer>
</main>

<script>
(function () {
  // ── SVG sac glass neon — arêtes lumineux + fill transparent + tube handles ──
  function makeBagSVG(id) {
    return `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- rim glow : colle aux arêtes, ne déborde pas -->
    <filter id="rim${id}" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- halo S -->
    <filter id="sg${id}" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- sol -->
    <filter id="gnd${id}" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <!-- remplissage face avant glass -->
    <linearGradient id="bf${id}" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0.14"/>
    </linearGradient>
    <!-- remplissage face latérale glass -->
    <linearGradient id="bs${id}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3B1285" stop-opacity="0.18"/>
    </linearGradient>
    <!-- arête neon gradient -->
    <linearGradient id="eg${id}" x1="110" y1="150" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5EEFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- ombre sol -->
  <ellipse cx="250" cy="438" rx="110" ry="16" fill="#7C3AED" opacity="0.50" filter="url(#gnd${id})"/>

  <!-- poignée arrière (tube dim) -->
  <path d="M200 148C200 113 220 85 256 85C292 85 312 113 312 148"
        stroke="#5B21B6" stroke-width="10" stroke-linecap="round" opacity="0.50"/>
  <path d="M200 148C200 113 220 85 256 85C292 85 312 113 312 148"
        stroke="#9F7AEA" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

  <!-- face latérale — glass fill -->
  <path d="M354 150L416 181L404 383L348 352L354 150Z" fill="url(#bs${id})"/>
  <!-- arête top laterale — tube neon -->
  <path d="M354 150L416 181" stroke="#7C3AED" stroke-width="8" stroke-linecap="round" opacity="0.55" filter="url(#rim${id})"/>
  <path d="M354 150L416 181" stroke="#EDE9FE" stroke-width="2" stroke-linecap="round" opacity="0.90"/>
  <!-- arête right latérale -->
  <path d="M416 181L404 383" stroke="#6D28D9" stroke-width="5" opacity="0.40" filter="url(#rim${id})"/>
  <path d="M416 181L404 383" stroke="#C4B5FD" stroke-width="1.2" opacity="0.65"/>
  <!-- arête bas latérale -->
  <path d="M348 352L404 383" stroke="#6D28D9" stroke-width="4" opacity="0.35" filter="url(#rim${id})"/>
  <path d="M348 352L404 383" stroke="#C4B5FD" stroke-width="1" opacity="0.55"/>

  <!-- face avant — glass fill -->
  <path d="M144 150H354L348 352H110L144 150Z" fill="url(#bf${id})"/>
  <!-- arête top face — tube neon principal -->
  <path d="M144 150H354" stroke="#8B5CF6" stroke-width="9" stroke-linecap="round" opacity="0.55" filter="url(#rim${id})"/>
  <path d="M144 150H354" stroke="#F5EEFF" stroke-width="2.2" stroke-linecap="round" opacity="0.95"/>
  <!-- arête gauche face -->
  <path d="M144 150L110 352" stroke="#7C3AED" stroke-width="6" opacity="0.45" filter="url(#rim${id})"/>
  <path d="M144 150L110 352" stroke="#DDD6FE" stroke-width="1.8" opacity="0.80"/>
  <!-- arête droite face -->
  <path d="M354 150L348 352" stroke="#7C3AED" stroke-width="6" opacity="0.45" filter="url(#rim${id})"/>
  <path d="M354 150L348 352" stroke="#DDD6FE" stroke-width="1.8" opacity="0.80"/>
  <!-- arête bas face -->
  <path d="M110 352H348" stroke="#6D28D9" stroke-width="5" opacity="0.38" filter="url(#rim${id})"/>
  <path d="M110 352H348" stroke="#C4B5FD" stroke-width="1.5" opacity="0.65"/>

  <!-- fond du sac -->
  <path d="M110 352L348 352L404 383L158 383L110 352Z" fill="#4C1D95" fill-opacity="0.55"/>
  <path d="M158 383L404 383" stroke="#A78BFA" stroke-width="1" opacity="0.50"/>
  <path d="M110 352L158 383" stroke="#9F7AEA" stroke-width="1" opacity="0.50"/>
  <path d="M348 352L404 383" stroke="#9F7AEA" stroke-width="1" opacity="0.50"/>

  <!-- reflet intérieur face -->
  <path d="M158 168H336L330 338H128L158 168Z" fill="#A855F7" opacity="0.07"/>
  <!-- highlight diagonal intérieur -->
  <path d="M158 168L188 210" stroke="#E9D5FF" stroke-width="1" opacity="0.18" stroke-linecap="round"/>

  <!-- poignée avant — tube neon fort -->
  <path d="M178 167C178 116 208 88 256 88C304 88 334 116 334 167"
        stroke="#7C3AED" stroke-width="16" stroke-linecap="round" opacity="0.55" filter="url(#rim${id})"/>
  <path d="M178 167C178 116 208 88 256 88C304 88 334 116 334 167"
        stroke="url(#eg${id})" stroke-width="3" stroke-linecap="round" opacity="0.97"/>
  <path d="M200 148V188" stroke="#7C3AED" stroke-width="16" stroke-linecap="round" opacity="0.55" filter="url(#rim${id})"/>
  <path d="M200 148V188" stroke="url(#eg${id})" stroke-width="3" stroke-linecap="round" opacity="0.97"/>
  <path d="M312 148V188" stroke="#7C3AED" stroke-width="16" stroke-linecap="round" opacity="0.55" filter="url(#rim${id})"/>
  <path d="M312 148V188" stroke="url(#eg${id})" stroke-width="3" stroke-linecap="round" opacity="0.97"/>

  <!-- S : halo violet + lettre lumineuse -->
  <text x="228" y="287" text-anchor="middle" font-size="148"
        font-family="Inter, Arial, sans-serif" font-weight="800"
        fill="#8B5CF6" opacity="0.70" filter="url(#sg${id})">S</text>
  <text x="228" y="287" text-anchor="middle" font-size="148"
        font-family="Inter, Arial, sans-serif" font-weight="800"
        fill="#EDE9FE" opacity="0.92">S</text>
</svg>`;
  }

  // ── Config : angles vraiment variés — front / 3/4 / top / bottom / profil / incliné ──
  const bags = [
    // [left%, top%, width_px, ry_deg, rx_deg, rz_deg, anim, dur, delay, opacity, bgBlur]
    [ -3,   4,  210,    2,    6,    1,  'float-a', 7.0, 0.0, 0.88, 0   ],  // quasi face
    [ 66,   2,  172,   42,   -7,    5,  'float-b', 6.5, 0.8, 0.82, 0   ],  // 3/4 droite fort
    [ 76,  50,  150,  -44,    9,   -4,  'float-c', 8.0, 1.5, 0.76, 0   ],  // 3/4 gauche fort
    [ -4,  52,  158,  -16,  -32,    4,  'float-d', 7.5, 2.2, 0.80, 0   ],  // vue du dessus
    [ 28,  70,  120,   14,   28,   -4,  'float-a', 9.0, 1.0, 0.70, 0   ],  // vue du dessous
    [ 54,  67,   98,   56,   -5,    8,  'float-b', 8.5, 3.0, 0.62, 1.5 ],  // presque profil droite
    [ 80,  14,  110,  -20,   14,  -18,  'float-c', 7.0, 0.5, 0.60, 1.5 ],  // incliné dramatique
    [ 11,  80,   90,    8,  -16,   22,  'float-d', 9.5, 2.0, 0.56, 1.5 ],  // rotation inverse
  ];

  const scene = document.getElementById('scene');

  bags.forEach(([l, t, w, ry, rx, rz, anim, dur, delay, op, bgBlur], i) => {
    const wrap = document.createElement('div');
    wrap.className = 'bag-wrap';
    wrap.style.cssText = `left:${l}%;top:${t}%;animation:${anim} ${dur}s ${delay}s ease-in-out infinite;`;

    const inner = document.createElement('div');
    inner.className = 'bag-svg';
    // glow extérieur : 3 couches = rim serré + halo moyen + aura légère
    const glow = bgBlur > 0
      ? `blur(${bgBlur}px) drop-shadow(0 0 3px #C084FC) drop-shadow(0 0 10px rgba(124,58,237,0.40))`
      : `drop-shadow(0 0 4px #DDD6FE) drop-shadow(0 0 14px rgba(139,92,246,0.55)) drop-shadow(0 0 28px rgba(109,40,217,0.28))`;
    inner.style.cssText = `
      width:${w}px;
      transform:perspective(900px) rotateY(${ry}deg) rotateX(${rx}deg) rotateZ(${rz}deg);
      opacity:${op};
      filter:${glow};
    `;
    inner.innerHTML = makeBagSVG(i);

    wrap.appendChild(inner);
    scene.appendChild(wrap);
  });

  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = (e.clientX / window.innerWidth  - 0.5);
    my = (e.clientY / window.innerHeight - 0.5);
  });

  const wraps = scene.querySelectorAll('.bag-wrap');
  function tick() {
    wraps.forEach((w, i) => {
      const depth = 0.4 + (i % 3) * 0.3;
      w.style.transform = `translate(${mx * 18 * depth}px,${my * 12 * depth}px)`;
    });
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
