<!DOCTYPE html>
<!--
  hugo.bnls — Link in Bio | MADE Agency
  ─────────────────────────────────────
  1. PHOTO_PROFIL  → src="avatar.jpg" (déjà en place)
  2. BG_IMAGE      → fond animé Three.js (en place)
  3. URL_COACHING  → remplacer href="#coaching"
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0D0A0E">
  <title>hugo.bnls</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lavender: #B691FE;
      --bg:       #0D0A0E;
      --baltic:   #2D232E;
      --tofu:     #F1F0EA;
      --white:    #FFFFFF;
      --font:     'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--tofu);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Three.js canvas full screen ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(182,145,254,0.45);
      overflow: hidden;
      box-shadow: 0 0 0 4px rgba(182,145,254,0.08), 0 0 32px rgba(182,145,254,0.15);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .header__name {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.04em;
      text-transform: lowercase;
    }

    .header__tagline {
      font-size: 0.85rem;
      color: var(--tofu);
      opacity: 0.70;
      line-height: 1.5;
      max-width: 300px;
    }

    /* ── Cards ── */
    .links { display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 16px 20px;
      background: rgba(45,35,46,0.75);
      border: 1px solid rgba(182,145,254,0.20);
      border-radius: 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-decoration: none;
      cursor: pointer;
      transition: background .2s ease, border-color .2s ease, transform .2s ease, box-shadow .2s ease;
    }
    .btn:hover {
      background: rgba(182,145,254,0.10);
      border-color: rgba(182,145,254,0.50);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(182,145,254,0.12);
    }
    .btn:active { transform: translateY(0); }

    .btn__icon {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(182,145,254,0.15);
      border: 1px solid rgba(182,145,254,0.30);
      display: flex; align-items: center; justify-content: center;
    }
    .btn__icon svg { width: 20px; height: 20px; }

    .btn__text { flex: 1; min-width: 0; }
    .btn__title {
      font-size: 0.95rem; font-weight: 600;
      color: var(--white); letter-spacing: -0.02em; line-height: 1.3;
    }
    .btn__sub {
      font-size: 0.78rem; color: var(--tofu);
      opacity: 0.60; margin-top: 2px; line-height: 1.4;
    }

    .btn__arrow {
      flex-shrink: 0; width: 16px; height: 16px;
      color: rgba(182,145,254,0.35); fill: none;
      stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      transition: color .2s ease, transform .2s ease;
    }
    .btn:hover .btn__arrow { color: rgba(182,145,254,.7); transform: translateX(2px); }

    .footer {
      margin-top: auto; padding-top: 36px;
      font-size: 0.65rem;
      color: rgba(241,240,234,0.20);
      text-align: center; letter-spacing: 0.02em;
    }

    @media (max-width: 375px) {
      .page { padding: 48px 16px 32px; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<main class="page">
  <header class="header">
    <div class="avatar">
      <img src="avatar.jpg" alt="hugo.bnls">
    </div>
    <h1 class="header__name">hugo.bnls</h1>
    <p class="header__tagline">Ne lance pas ta marque au hasard.<br>Récupère ta stratégie ici.</p>
  </header>

  <nav class="links">
    <a class="btn" href="https://cal.com/team/made-academie/decouverte-e-com" target="_blank" rel="noopener noreferrer">
      <div class="btn__icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shopify bag -->
          <rect x="3" y="7" width="14" height="11" rx="2" stroke="#B691FE" stroke-width="1.6"/>
          <path d="M7 7C7 4.79086 8.34315 3 10 3C11.6569 3 13 4.79086 13 7" stroke="#B691FE" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M8 11.5C8 11.5 8.8 13 10 13C11.2 13 12 11.5 12 11.5" stroke="#B691FE" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="btn__text">
        <span class="btn__title">Réserve et découvre notre coaching E-com</span>
        <span class="btn__sub">Postule pour rejoindre nos programmes</span>
      </div>
      <svg class="btn__arrow" viewBox="0 0 16 16"><polyline points="6 3 11 8 6 13"/></svg>
    </a>

    <a class="btn" href="https://instagram.com/hugo.bnls" target="_blank" rel="noopener noreferrer">
      <div class="btn__icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="16" height="16" rx="5" stroke="#B691FE" stroke-width="1.7"/>
          <circle cx="10" cy="10" r="3.2" stroke="#B691FE" stroke-width="1.7"/>
          <circle cx="14.8" cy="5.2" r="1" fill="#B691FE"/>
        </svg>
      </div>
      <div class="btn__text">
        <span class="btn__title">Suis mon quotidien</span>
        <span class="btn__sub">Rejoins-moi sur Instagram (Off &amp; Uncut)</span>
      </div>
      <svg class="btn__arrow" viewBox="0 0 16 16"><polyline points="6 3 11 8 6 13"/></svg>
    </a>
  </nav>

  <footer class="footer">hugo.bnls &copy; 2025</footer>
</main>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0D0A0E, 1);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0D0A0E, 0.022);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 18);

  /* ── Lights ── */
  scene.add(new THREE.AmbientLight(0xB691FE, 0.45));
  const pl1 = new THREE.PointLight(0xB691FE, 2.5, 100);
  pl1.position.set(-10, 12, 10); scene.add(pl1);
  const pl2 = new THREE.PointLight(0x7040C0, 1.8, 80);
  pl2.position.set(14, -10, 6); scene.add(pl2);
  const pl3 = new THREE.PointLight(0xffffff, 1.5, 50);
  pl3.position.set(0, 2, 16); scene.add(pl3);

  /* ── Texture : S Shopify propre, fond violet uni ── */
  function makeFaceTex() {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#5520AA';
    ctx.fillRect(0, 0, 512, 512);
    // S blanc net
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '800 310px Arial Black, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('S', 256, 265);
    return new THREE.CanvasTexture(c);
  }
  const FACE_TEX = makeFaceTex();

  /* ── Couleurs uniformes violet — pas de rose ── */
  const C_FRONT = new THREE.MeshLambertMaterial({ map: FACE_TEX });
  const C_SIDE  = new THREE.MeshLambertMaterial({ color: 0x4A1A9A });
  const C_DARK  = new THREE.MeshLambertMaterial({ color: 0x33107A });
  const C_TOP   = new THREE.MeshLambertMaterial({ color: 0x5A20A8 });
  const C_BACK  = new THREE.MeshLambertMaterial({ color: 0x3A1288 });

  /* ── Bag builder ── */
  function makeShopifyBag() {
    const g = new THREE.Group();
    const W = 2.0, H = 2.0, D = 0.65;

    const bodyGeo = new THREE.BoxGeometry(W, H, D);
    // BoxGeometry face order: +x, -x, +y(top), -y(bot), +z(front), -z(back)
    g.add(new THREE.Mesh(bodyGeo, [C_SIDE, C_DARK, C_TOP, C_DARK, C_FRONT, C_BACK]));

    // Arêtes subtiles
    g.add(new THREE.LineSegments(
      new THREE.EdgesGeometry(bodyGeo),
      new THREE.LineBasicMaterial({ color: 0xC8A4FF, transparent: true, opacity: 0.55 })
    ));

    // Anses — deux boucles symétriques
    [-0.47, 0.47].forEach(xOff => {
      const hY = H / 2;
      const pts = [
        new THREE.Vector3(xOff - 0.20, hY,        0),
        new THREE.Vector3(xOff - 0.08, hY + 0.48, 0),
        new THREE.Vector3(xOff,        hY + 0.62, 0),
        new THREE.Vector3(xOff + 0.08, hY + 0.48, 0),
        new THREE.Vector3(xOff + 0.20, hY,        0),
      ];
      g.add(new THREE.Mesh(
        new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 24, 0.048, 10, false),
        new THREE.MeshLambertMaterial({ color: 0xEEDDFF })
      ));
    });

    return g;
  }

  /* ── Spawn bags ── */
  const bagCfgs = [
    { x: -8,  y:  4,  z: -7,  s: 1.7,  rs: 0.0028, fa: 0.9,  fs: 0.45 },
    { x:  7,  y: -3,  z: -5,  s: 1.2,  rs: 0.0042, fa: 1.0,  fs: 0.60 },
    { x: -4,  y: -8,  z: -12, s: 2.0,  rs: 0.0018, fa: 1.2,  fs: 0.30 },
    { x: 10,  y:  7,  z: -15, s: 2.4,  rs: 0.0013, fa: 0.7,  fs: 0.38 },
    { x:  2,  y:  9,  z: -9,  s: 1.3,  rs: 0.0032, fa: 0.8,  fs: 0.55 },
    { x:-12,  y: -1,  z: -17, s: 2.8,  rs: 0.0010, fa: 1.5,  fs: 0.22 },
    { x:  5,  y:-11,  z: -13, s: 1.5,  rs: 0.0024, fa: 1.1,  fs: 0.40 },
  ];

  const bags = [];
  bagCfgs.forEach(cfg => {
    const bag = makeShopifyBag();
    bag.scale.setScalar(cfg.s);
    bag.position.set(cfg.x, cfg.y, cfg.z);
    bag.rotation.set(
      (Math.random() - 0.5) * 0.5,
      (Math.random() - 0.5) * 1.2,
      (Math.random() - 0.5) * 0.2
    );
    bag.userData = { ...cfg, originY: cfg.y, phase: Math.random() * Math.PI * 2 };
    scene.add(bag);
    bags.push(bag);
  });

  /* ── Particles ── */
  const pCount = 350;
  const pPos = new Float32Array(pCount * 3);
  for (let i = 0; i < pCount; i++) {
    pPos[i*3]   = (Math.random()-0.5)*100;
    pPos[i*3+1] = (Math.random()-0.5)*80;
    pPos[i*3+2] = (Math.random()-0.5)*80 - 12;
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
    color: 0xC9A8FF, size: 0.09, transparent: true, opacity: 0.50, sizeAttenuation: true,
  }));
  scene.add(particles);

  /* ── Animated gradient bg ── */
  const gradMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      uniform float uTime; varying vec2 vUv;
      void main(){
        float spot1 = exp(-length(vUv - vec2(0.15+sin(uTime*0.11)*0.12, 0.78+cos(uTime*0.09)*0.10))*3.2);
        float spot2 = exp(-length(vUv - vec2(0.82+cos(uTime*0.08)*0.10, 0.22+sin(uTime*0.10)*0.12))*3.8);
        float wave  = sin(vUv.x*2.5+uTime*0.2)*cos(vUv.y*2.0-uTime*0.15)*0.5+0.5;
        vec3 dark   = vec3(0.051,0.039,0.055);
        vec3 purple = vec3(0.20,0.08,0.35);
        vec3 col    = mix(dark, purple, spot1*0.55 + spot2*0.45 + wave*0.18);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
    depthWrite: false,
  });
  const gradPlane = new THREE.Mesh(new THREE.PlaneGeometry(100, 80), gradMat);
  gradPlane.position.z = -32;
  scene.add(gradPlane);

  /* ── Mouse ── */
  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  /* ── Resize ── */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ── Loop ── */
  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.010;
    gradMat.uniforms.uTime.value = t;

    camera.position.x += (mouseX * 1.8 - camera.position.x) * 0.025;
    camera.position.y += (-mouseY * 1.2 - camera.position.y) * 0.025;
    camera.lookAt(0, 0, 0);

    bags.forEach(bag => {
      const d = bag.userData;
      bag.rotation.y += d.rs;
      bag.rotation.x += d.rs * 0.3;
      bag.position.y = d.originY + Math.sin(t * d.fs + d.phase) * d.fa;
    });

    particles.rotation.y = t * 0.012;
    particles.rotation.x = t * 0.006;

    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
